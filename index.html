<!doctype html>
<html lang="en" data-bs-theme="dark" id="pps">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./assets/styles.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <img src="./assets/images/logo.svg" alt="logo">
            <ul class="nav">
                <li class="nav-item">
                    Active
                </li>

            </ul>
        </div>
    </nav>
    <section class="nav overflow-hidden live-markets">
        <span class="live--label">Live Markets</span>
        <div class="content d-flex align-items-center" id="live-markets">
            <li class="nav-item live--rates">
                USD/MX 17.32
            </li>
        </div>
    </section>



    <div class="container mt-3 mb-5">
        <section class="converter-wrapper">
            <span>Check the rate</span>
            <div class="top-container d-flex justify-content-between mt-2">
                <div class="cont">
                    <div class="first-container">
                        <span>Send</span>
                    </div>
                    <div class="second-container mt-2">
                        <input type='number' min="0" max="9999" id='input_send' step="any">
                        <select id='select_send'>
                            <option value="USD">USD DOLLAR</option>
                            <option value="EUR">EUR EURO</option>
                            <option value="MXN">MXN PESO MXN</option>
                        </select>
                    </div>
                </div>

                <div class="cont">
                    <div class="second-container">
                        <span>Receive</span>
                    </div>
                    <div class="second-container mt-2">
                        <input type='number' min="0" max="9999" id='input_receive' step="any">
                        <select id="select_receive">
                            <option value="MXN">MXN PESO MXN</option>
                            <option value="EUR">EUR EURO</option>
                            <option value="USD">USD DOLLAR</option>
                        </select>
                    </div>
                </div>

            </div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="./assets/live.js"></script>
    <script src="./assets/converter.js"></script>
</body>

</html>
